<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<title>Map Editor</title><link rel="stylesheet" href="style.css"></head><body>
<div id="toolbar">
Breite <input id="w" type="number" value="20" style="width:60px">
Höhe <input id="h" type="number" value="20" style="width:60px">
<button onclick="newMap()">Neue Map</button>
<button onclick="doUndo()">↶</button>
<button onclick="doRedo()">↷</button><br><br>
<button onclick="selectTile(0)">0</button>
<button onclick="selectTile(1)">1</button>
<button onclick="selectTile(2)">2</button>
<button onclick="selectTile(3)">3</button>
<button onclick="selectFill()">Füllen</button>
<button onclick="selectRect()">Rechteck</button>
<button onclick="selectChest()">Kiste</button>
<button onclick="selectSpawn()">Spawn</button>
Zoom <input type="range" min="0.5" max="3" step="0.25" value="1" oninput="setZoom(this.value)">
<span id="coords">X:0 Y:0</span><br><br>
<button onclick="exportMap()">Export</button>
<input type="file" onchange="importMap(this.files[0])">
</div>
<canvas id="map"></canvas>
<script src="editor.js"></script></body></html>
